<style>
:root {
  --bg:#fafaf7; --bg2:#f0efea; --surface:#ffffff; --surface2:#fafaf6;
  --border:#e3e1da; --border-mid:#c4c2b9;
  --text:#0a2447; --text-mid:#2d4570; --text-dim:#6b7a90;
  --sky:#4a90d9; --sky-light:#bcd6ef;
  --navy:#1a4480; --navy-dark:#0a2447; --navy-light:#e8eef7;
  --gold:#c9a961; --gold-dark:#a8893f; --gold-light:#f7efd9;
  --green:#1a6b3c; --green-bg:#f0f7f3; --green-border:rgba(26,107,60,0.2);
  --blue1:#1a4480; --blue2:#0a2447; --blue-light:#e8eef7; --blue-chip:rgba(26,68,128,0.2);
  --warn:#a8893f; --warn-bg:#f7efd9;
  --lead-accent:#c9a961;
  --gradient-blue: linear-gradient(135deg, #4a90d9 0%, #1a4480 50%, #0a2447 100%);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); font-family:"Inter",sans-serif; -webkit-font-smoothing:antialiased; color:var(--text); }
.crm-root { max-width:780px; margin:0 auto; padding:0 0 80px; background:var(--bg); min-height:100vh; }
.crm-header { background:var(--gradient-blue); color:#fff; padding:20px 24px 16px; display:flex; justify-content:space-between; align-items:flex-start; position:sticky; top:0; z-index:100; }
.logo-wordmark { font-family:"Cormorant Garamond",serif; font-size:22px; font-weight:700; letter-spacing:0.12em; color:#fff; }
.logo-sub { font-size:9px; letter-spacing:0.18em; color:var(--gold); margin-top:2px; text-transform:uppercase; font-style:italic; }
.tab-row { display:flex; gap:0; border-bottom:1px solid var(--border); background:var(--surface); padding:0 16px; overflow-x:auto; position:sticky; top:72px; z-index:99; }
.tab { background:none; border:none; border-bottom:2px solid transparent; padding:12px 14px; font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
.tab.active { color:var(--navy); border-bottom-color:var(--navy); }
.tab-badge { background:var(--bg2); color:var(--text-mid); font-size:9px; padding:1px 6px; margin-left:4px; }
.tab.active .tab-badge { background:var(--navy); color:#fff; }
.content { padding:20px 20px; }
.controls { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.search-input { flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--border); background:var(--surface); font-family:"DM Mono",monospace; font-size:11px; color:var(--text); outline:none; }
.filter-btn { padding:6px 12px; border:1px solid var(--border); background:var(--surface); font-family:"DM Mono",monospace; font-size:9px; letter-spacing:0.1em; color:var(--text-dim); cursor:pointer; text-transform:uppercase; }
.filter-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.select-mode-btn { background:none; border:1px solid var(--border-mid); color:var(--text-dim); padding:6px 12px; font-family:"DM Mono",monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
.select-mode-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.count-label { font-size:9px; letter-spacing:0.14em; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; }
.card { background:var(--surface); border:1px solid var(--border); border-left:3px solid transparent; padding:14px 18px; margin-bottom:6px; cursor:pointer; }
.card.acct { border-left-color:var(--navy); }
.card.lead { border-left-color:var(--lead-accent); }
.card.inv  { border-left-color:var(--green); }
.card.selected { background:var(--navy-light); border-color:var(--navy); }
.card-row { display:flex; gap:12px; align-items:center; }
.card-name { font-family:"Cormorant Garamond",serif; font-size:17px; font-weight:600; color:var(--text); }
.card-meta { font-size:10px; color:var(--text-dim); margin-top:3px; }
.card-amt  { text-align:right; flex-shrink:0; font-size:13px; color:var(--navy); font-weight:600; }
.card-date { font-size:10px; color:var(--text-dim); margin-top:2px; }
.type-chip { font-size:9px; padding:2px 7px; border:1px solid var(--border); color:var(--text-dim); letter-spacing:0.08em; flex-shrink:0; }
.lead-chip { font-size:9px; padding:2px 7px; background:var(--gold-light); border:1px solid rgba(201,169,97,0.4); color:var(--gold-dark); letter-spacing:0.08em; flex-shrink:0; font-weight:600; }
.checkbox { width:18px; height:18px; border:1.5px solid var(--border-mid); border-radius:3px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; background:#fff; }
.checkbox.checked { background:var(--navy); border-color:var(--navy); }
.checkbox.checked::after { content:"\2713"; color:#fff; font-size:12px; font-weight:700; }
.selection-bar { position:sticky; top:112px; z-index:90; background:var(--navy); color:#fff; padding:10px 16px; display:flex; gap:10px; align-items:center; margin:0 -20px 14px; flex-wrap:wrap; }
.selection-bar .count { font-family:"Cormorant Garamond",serif; font-size:18px; font-weight:600; }
.selection-bar .label { font-family:"DM Mono",monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.7); margin-right:auto; }
.bulk-btn { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:6px 12px; font-family:"DM Mono",monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
.bulk-btn.danger { background:rgba(192,57,43,0.25); border-color:rgba(192,57,43,0.5); }
.kpi-row { display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
.kpi { background:var(--surface); border:1px solid var(--border); padding:14px 18px; flex:1 1 130px; }
.kpi-label { font-size:9px; color:var(--text-dim); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:4px; }
.kpi-val { font-family:"Cormorant Garamond",serif; font-size:24px; font-weight:700; color:var(--navy); }
.kpi-val.green { color:var(--green); }
.kpi-val.warm  { color:var(--warn); }
.kpi-sub { font-size:10px; color:var(--text-dim); margin-top:2px; }
.section-title { font-size:9px; letter-spacing:0.14em; color:var(--text-dim); text-transform:uppercase; margin:20px 0 10px; }
.rpt-bar-row { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--navy); padding:14px 18px; margin-bottom:6px; }
.rpt-bar-row.green { border-left-color:var(--green); }
.rpt-bar-row.warm  { border-left-color:var(--warn); }
.rpt-row-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.rpt-name { font-family:"Cormorant Garamond",serif; font-size:16px; font-weight:600; color:var(--text); }
.rpt-amt  { font-family:"DM Mono",monospace; font-size:13px; font-weight:500; }
.rpt-meta { font-size:10px; color:var(--text-dim); }
.bar-track { background:var(--bg2); border-radius:2px; height:5px; margin-bottom:6px; }
.bar-fill  { height:5px; border-radius:2px; background:var(--navy); }
.bar-fill.green { background:var(--green); }
.form-wrap { padding:0 20px 20px; }
.form-title { font-family:"Cormorant Garamond",serif; font-size:20px; font-weight:700; color:var(--navy); padding:16px 20px 12px; }
.fr { display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
.fr > div { flex:1 1 200px; }
.fr1 > div { width:100%; }
.fl { display:block; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; }
.fi { width:100%; padding:9px 10px; border:1px solid var(--border); background:var(--surface); font-family:"DM Mono",monospace; font-size:11px; color:var(--text); outline:none; }
.fs { width:100%; padding:9px 10px; border:1px solid var(--border); background:var(--surface); font-family:"DM Mono",monospace; font-size:11px; color:var(--text); outline:none; }
.fta { width:100%; padding:9px 10px; border:1px solid var(--border); background:var(--surface); font-family:"DM Mono",monospace; font-size:11px; color:var(--text); outline:none; min-height:80px; resize:vertical; }
.action-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
.btn-primary { padding:10px 20px; background:var(--navy); color:#fff; border:none; font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
.btn-secondary { padding:10px 20px; background:none; color:var(--text-mid); border:1px solid var(--border); font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
.btn-del { padding:10px 20px; background:none; color:#c0392b; border:1px solid rgba(192,57,43,0.3); font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
.btn-ghost { background:none; border:none; font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.1em; color:var(--text-dim); cursor:pointer; padding:16px 20px 0; text-transform:uppercase; }
.expr-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:2px; }
.expr-btn { padding:8px 14px; border:1px solid var(--border-mid); background:var(--surface); font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.08em; color:var(--text-mid); cursor:pointer; text-transform:uppercase; border-radius:2px; }
.expr-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.empty-state { background:var(--surface2); border:1px solid var(--border); padding:32px 24px; text-align:center; }
.empty-title { font-family:"Cormorant Garamond",serif; font-size:20px; color:var(--text-mid); margin-bottom:8px; }
.empty-sub { font-size:11px; color:var(--text-dim); margin-bottom:20px; }
.save-toast { position:fixed; bottom:24px; right:20px; background:var(--navy); color:#fff; font-family:"DM Mono",monospace; font-size:10px; letter-spacing:0.1em; padding:8px 16px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:9999; }
.save-toast.show { opacity:1; }
.divider { border:none; border-top:1px solid var(--border); margin:4px 0 20px; }
.sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }
.sync-dot.on { background:#4ade80; }
.sync-dot.off { background:#9ca3af; }
</style>

function DiosAzulCRM() {
  const [accounts, setAccounts] = useState(() => { try { const s = localStorage.getItem("da_accounts"); return s ? JSON.parse(s) : ACCOUNTS_INIT; } catch { return ACCOUNTS_INIT; } });
  const [leads, setLeads] = useState(() => { try { const s = localStorage.getItem("da_leads"); return s ? JSON.parse(s) : LEADS_INIT; } catch { return LEADS_INIT; } });
  const [invoices, setInvoices] = useState(() => { try { const s = localStorage.getItem("da_invoices"); return s ? JSON.parse(s) : INVOICES_INIT; } catch { return INVOICES_INIT; } });
  const [tab, setTab] = useState("accounts");
  const [view, setView] = useState("list");
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("All");
  const [form, setForm] = useState(emptyAccount);
  const [lform, setLform] = useState(emptyLead);
  const [iform, setIform] = useState(emptyInvoice);
  const [invSearch, setInvSearch] = useState("");
  const [reportMonth, setReportMonth] = useState("all");
  const [selectMode, setSelectMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [saveToast, setSaveToast] = useState(false);
  const [syncUrl, setSyncUrl] = useState(() => { try { return localStorage.getItem("da_sync_url") || ""; } catch { return ""; } });
  const [syncStatus, setSyncStatus] = useState("");
  const [autoSync, setAutoSync] = useState(() => { try { return localStorage.getItem("da_auto_sync") === "1"; } catch { return false; } });
  const [showSettings, setShowSettings] = useState(false);
  const toastTimer = useRef(null);
  const pushTimer = useRef(null);
 
  useEffect(() => { try { localStorage.setItem("da_accounts", JSON.stringify(accounts)); } catch {} }, [accounts]);
  useEffect(() => { try { localStorage.setItem("da_leads", JSON.stringify(leads)); } catch {} }, [leads]);
  useEffect(() => { try { localStorage.setItem("da_invoices", JSON.stringify(invoices)); } catch {} }, [invoices]);
 
  const persist = (key, setter, data) => {
    setter(data);
    try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setSaveToast(true);
    toastTimer.current = setTimeout(() => setSaveToast(false), 1500);
  };
 
  // ---- Cloud sync (real fetch — works on GitHub Pages) ----
  const saveSyncUrl = (url) => { setSyncUrl(url); try { localStorage.setItem("da_sync_url", url); } catch {} };
  const cloudPush = async (silent) => {
    if (!syncUrl) { if (!silent) setSyncStatus("Set sync URL in Settings first"); return; }
    if (!silent) setSyncStatus("Pushing to cloud...");
    try {
      await fetch(syncUrl, { method:"POST", body: JSON.stringify({ accounts, leads, invoices }), headers:{"Content-Type":"text/plain;charset=utf-8"} });
      if (!silent) { setSyncStatus("Pushed at " + new Date().toLocaleTimeString()); setTimeout(()=>setSyncStatus(""), 3000); }
    } catch (err) { if (!silent) setSyncStatus("Push failed: " + err.message); }
  };
  const cloudPull = async () => {
    if (!syncUrl) { setSyncStatus("Set sync URL in Settings first"); return; }
    setSyncStatus("Pulling from cloud...");
    try {
      const res = await fetch(syncUrl + "?type=all&_=" + Date.now());
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (data.accounts) { setAccounts(data.accounts); localStorage.setItem("da_accounts", JSON.stringify(data.accounts)); }
      if (data.leads) { setLeads(data.leads); localStorage.setItem("da_leads", JSON.stringify(data.leads)); }
      if (data.invoices) { setInvoices(data.invoices); localStorage.setItem("da_invoices", JSON.stringify(data.invoices)); }
      setSyncStatus("Pulled at " + new Date().toLocaleTimeString()); setTimeout(()=>setSyncStatus(""), 3000);
    } catch (err) { setSyncStatus("Pull failed: " + err.message); }
  };
  useEffect(() => {
    if (!autoSync || !syncUrl) return;
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => cloudPush(true), 2000);
    return () => { if (pushTimer.current) clearTimeout(pushTimer.current); };
  }, [accounts, leads, invoices, autoSync, syncUrl]);
  const toggleAutoSync = () => { const n = !autoSync; setAutoSync(n); try { localStorage.setItem("da_auto_sync", n?"1":"0"); } catch {} };
  // Auto-pull once on load if sync configured
  useEffect(() => { if (syncUrl) cloudPull(); /* eslint-disable-next-line */ }, []);
 
  const switchTab = t => { setTab(t); setView("list"); setSearch(""); setFilterType("All"); setInvSearch(""); setSelectMode(false); setSelectedIds(new Set()); };
  const fmt = n => "$" + (Number(n)||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

      {tab==="reports" && <>
        <p style={{fontFamily:"Cormorant Garamond,serif",fontSize:22,fontWeight:700,marginBottom:4}}>Sales Reports</p>
        <div className="kpi-row"><div className="kpi"><p className="kpi-label">Total Revenue</p><p className="kpi-val green">{fmt(totalRev)}</p><p className="kpi-sub">{invoices.length} orders</p></div><div className="kpi"><p className="kpi-label">Company Income</p><p className="kpi-val" style={{color:"var(--gold-dark)"}}>{fmt(totalCases*65)}</p><p className="kpi-sub">$65 &times; {totalCases}</p></div><div className="kpi"><p className="kpi-label">Cases</p><p className="kpi-val">{totalCases}</p></div><div className="kpi"><p className="kpi-label">Avg Order</p><p className="kpi-val warm">{invoices.length?fmt(totalRev/invoices.length):"$0"}</p></div></div>
        <p className="section-title">Monthly</p>
        {months.map(m=>{const d=monthlyMap[m];const pct=totalRev>0?(d.revenue/totalRev)*100:0;return <div key={m} className="rpt-bar-row"><div className="rpt-row-top"><span className="rpt-name">{monthLabel(m)}</span><span className="rpt-amt" style={{color:"var(--navy)"}}>{fmt(d.revenue)}</span></div><div className="bar-track"><div className="bar-fill" style={{width:pct+"%"}}/></div><p className="rpt-meta">{d.orders} orders &middot; {d.cases} cases</p></div>;})}
        <p className="section-title">By Territory</p>
        {Object.entries(terrMap).sort((a,b)=>b[1].revenue-a[1].revenue).map(([t,d])=><div key={t} className="rpt-bar-row green"><div className="rpt-row-top"><span className="rpt-name">{t}</span><span className="rpt-amt" style={{color:"var(--green)"}}>{fmt(d.revenue)}</span></div><p className="rpt-meta">{d.orders} orders &middot; {d.cases} cases</p></div>)}
        <p className="section-title">By Account</p>
        {Object.entries(acctMap).sort((a,b)=>b[1].revenue-a[1].revenue).map(([ac,d])=><div key={ac} className="rpt-bar-row warm"><div className="rpt-row-top"><span className="rpt-name">{ac}</span><span className="rpt-amt" style={{color:"var(--warn)"}}>{fmt(d.revenue)}</span></div><p className="rpt-meta">{d.territory} &middot; {d.orders} orders &middot; {d.cases} cases</p></div>)}
      </>}
    </div>
 
    {showSettings && <div style={{position:"fixed",inset:0,background:"rgba(10,36,71,0.6)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowSettings(false)}>
      <div style={{background:"var(--surface)",maxWidth:520,width:"100%",padding:24,border:"1px solid var(--border)"}} onClick={e=>e.stopPropagation()}>
        <p style={{fontFamily:"Cormorant Garamond,serif",fontSize:24,fontWeight:700,color:"var(--navy)",marginBottom:6}}>Cloud Sync</p>
        <p style={{fontSize:11,color:"var(--text-dim)",marginBottom:18}}>Syncs across all devices via Google Sheets.</p>
        <div style={{marginBottom:18}}><label className="fl">Apps Script Web App URL</label><input className="fi" value={syncUrl} onChange={e=>saveSyncUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/></div>
        <div style={{marginBottom:18,padding:"12px 14px",background:"var(--navy-light)",border:"1px solid var(--border)"}}><label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:11}}><input type="checkbox" checked={autoSync} onChange={toggleAutoSync}/><span><b>Auto-sync</b> &mdash; push changes automatically</span></label></div>
        <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}><button className="btn-primary" onClick={()=>cloudPush(false)}>Push Now</button><button className="btn-primary" style={{background:"var(--gold-dark)"}} onClick={cloudPull}>Pull Now</button><button className="btn-secondary" onClick={()=>setShowSettings(false)}>Close</button></div>
        {syncStatus && <p style={{fontSize:11,color:"var(--navy)",marginTop:8}}>{syncStatus}</p>}
      </div>
    </div>}
 
    {syncStatus && !showSettings && <div style={{position:"fixed",bottom:60,right:20,background:"var(--navy)",color:"#fff",padding:"10px 16px",fontFamily:"DM Mono,monospace",fontSize:11,zIndex:9999}}>{syncStatus}</div>}
    <div className={"save-toast"+(saveToast?" show":"")}>&#10003; SAVED</div>
  </div>);
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<DiosAzulCRM/>);
</script>
</body>
